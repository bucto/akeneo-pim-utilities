services:

  web_frontend:
    build:
      context: ./app
      args:
        GIT_REVISION: ${GIT_REVISION:-dev}
    container_name: akeneo_pim_utilities
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8085}:80"
    environment:
      DB_HOST:     ${DB_HOST:-amada-db-mariadb11}
      DB_PORT:     ${DB_PORT:-3306}
      DB_NAME:     ${DB_NAME:-}
      DB_USER:     ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      PIM_API_BASE_URL:  ${PIM_API_BASE_URL:-}
      PIM_API_USERNAME:  ${PIM_API_USERNAME:-}
      PIM_API_PASSWORD:  ${PIM_API_PASSWORD:-}
      PIM_CLIENT_ID:     ${PIM_CLIENT_ID:-}
      PIM_CLIENT_SECRET: ${PIM_CLIENT_SECRET:-}
      PIM_TLS_INSECURE:  ${PIM_TLS_INSECURE:-true}
      PIM_MEDIA_BASE_URL: ${PIM_MEDIA_BASE_URL:-}
      PIM_MEDIA_CACHE:    ${PIM_MEDIA_CACHE:-thumbnail_small}
      PIM_IMAGE_ATTRS:    ${PIM_IMAGE_ATTRS:-picture,filename_picture_perspective}
      PIM_LOCALE:         ${PIM_LOCALE:-de_DE}
      PIM_CHANNEL:        ${PIM_CHANNEL:-ecommerce}
      ADMIN_ENABLED:      ${ADMIN_ENABLED:-false}
      APP_AUTHOR:         ${APP_AUTHOR:-Thomas Bücken}
      APP_REPO:           ${APP_REPO:-https://github.com/bucto/akeneo-pim-utilities}
      APP_REVISION:       ${APP_REVISION:-}
    networks:
      - default
      - amada-db

networks:
  amada-db:
    external: true
    name: ${DB_NETWORK:-amada-db-network}
